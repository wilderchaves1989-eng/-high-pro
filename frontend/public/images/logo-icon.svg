<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- H estilizado HighPro - fundo transparente -->
  <!-- Pilar esquerdo -->
  <rect x="10" y="22" width="22" height="68" rx="5" fill="#1A6FEF"/>
  <!-- Pilar direito -->
  <rect x="58" y="10" width="22" height="68" rx="5" fill="#1A6FEF"/>
  <!-- Diagonal esquerda->direita (barra do H) -->
  <polygon points="32,40 58,28 58,72 32,84" fill="#1456C0"/>
  <!-- Sobreposicao superior pilar esquerdo -->
  <rect x="10" y="22" width="22" height="20" rx="5" fill="#1A6FEF"/>
  <!-- Sobreposicao inferior pilar direito -->
  <rect x="58" y="58" width="22" height="20" rx="5" fill="#1A6FEF"/>
</svg>
